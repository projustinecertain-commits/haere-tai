<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haere Tai — Bestiaire marin de Polynésie</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
</head>
<body class="gallery-page">
  <div class="ocean-bg"></div>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-block">
        <span class="logo-tahitian">haere tai</span>
        <span class="logo-sub">Bestiaire marin · Polynésie française</span>
      </div>
      <nav class="header-nav">
        <button class="filter-btn active" data-famille="all">Tout</button>
        <button class="filter-btn" data-famille="Poisson">Poissons</button>
        <button class="filter-btn" data-famille="Corail">Coraux</button>
        <button class="filter-btn" data-famille="Crustacé">Crustacés</button>
        <button class="filter-btn" data-famille="Mollusque">Mollusques</button>
        <button class="filter-btn" data-famille="Autre">Autres</button>
      </nav>
    </div>
  </header>
  <main class="gallery-main">
    <section class="hero">
      <p class="hero-count"><span id="species-count">—</span> espèces répertoriées</p>
      <h1 class="hero-title">Les créatures<br/><em>des lagons</em></h1>
    </section>
    <div class="search-bar-wrap">
      <input type="text" id="search-input" placeholder="Rechercher une espèce…" class="search-input" />
    </div>
