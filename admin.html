<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haere Tai — Admin</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
</head>
<body class="admin-page">
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <h2 class="login-title">haere tai</h2>
      <p class="login-sub">Espace administration</p>
      <input type="password" id="password-input" placeholder="Mot de passe" class="admin-input" />
      <button id="login-btn" class="btn-primary">Entrer</button>
      <p id="login-error" class="login-error hidden">Mot de passe incorrect</p>
    </div>
  </div>
  <div id="admin-panel" class="hidden">
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="back-link">← Haere Tai</a>
        <span class="admin-badge">Admin</span>
      </div>
    </header>
    <main class="admin-main">
      <h1 class="admin-title">Nouvelle espèce</h1>
      <div class="admin-form">
        <div class="form-group photo-group">
          <label class="form-label">Photo *</label>
          <div class="photo-upload-area" id="photo-upload-area">
            <input type="file" id="photo-input" accept="image/*" class="photo-input-hidden" />
            <div class="photo-placeholder" id="photo-placeholder">
              <span class="upload-icon">📷</span>
              <span>Appuyer pour choisir une photo</span>
            </div>
            <img id="photo-preview" class="photo-preview hidden" alt="Aperçu" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Nom commun *</label>
          <input type="text" id="nom-commun" class="admin-input" placeholder="Ex: Poisson-clown" />
        </div>
        <div class="form-group">
          <label class="form-label">Nom scientifique</label>
          <input type="text" id="nom-scientifique" class="admin-input italic-input" placeholder="Ex: Amphiprion ocellaris" />
        </div>
        <div class="form-group">
          <label class="form-label">Famille *</label>
          <div class="select-wrap">
            <select id="famille" class="admin-select">
              <option value="">Choisir…</option>
              <option value="Poisson">Poisson</option>
              <option value="Corail">Corail</option>
              <option value="Crustacé">Crustacé</option>
              <option value="Mollusque">Mollusque</option>
              <option value="Échinoderme">Échinoderme</option>
              <option value="Raie">Raie</option>
              <option value="Requin">Requin</option>
              <option value="Tortue">Tortue</option>
              <option value="Autre">Autre</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Lieu *</label>
            <input type="text" id="lieu" class="admin-input" placeholder="Ex: Moorea, pass Taotoi" />
          </div>
          <div class="form-group">
            <label class="form-label">Date *</label>
            <input type="date" id="date" class="admin-input" />
          </div>
        </div>
        <div class="form-group half">
          <label class="form-label">Profondeur (m)</label>
          <input type="number" id="profondeur" class="admin-input" placeholder="Ex: 18" min="0" max="100" />
        </div>
        <div class="form-group">
          <label class="form-label">Rareté</label>
          <div class="stars-input" id="rarete-stars">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
          </div>
          <input type="hidden" id="rarete" value="0" />
        </div>
        <div class="form-group">
          <label class="form-label">Dangerosité</label>
          <div class="danger-input">
            <button type="button" class="danger-btn" data-value="vert"><span class="danger-dot green"></span> Sans danger</button>
            <button type="button" class="danger-btn" data-value="orange"><span class="danger-dot orange"></span> Prudence</button>
            <button type="button" class="danger-btn" data-value="rouge"><span class="danger-dot red"></span> Dangereux</button>
          </div>
          <input type="hidden" id="dangerosite" value="" />
        </div>
        <div class="form-group">
          <label class="form-label">Anecdote</label>
          <textarea id="anecdote" class="admin-textarea" placeholder="Une observation, une histoire…" rows="4"></textarea>
        </div>
        <div class="form-actions">
          <button id="submit-btn" class="btn-primary btn-large">
            <span id="submit-label">Ajouter l'espèce</span>
            <span id="submit-loading" class="hidden">Enregistrement…</span>
          </button>
          <p id="submit-error" class="submit-error hidden"></p>
          <p id="submit-success" class="submit-success hidden">✓ Espèce ajoutée !</p>
        </div>
      </div>
      <div class="admin-species-list">
        <h2 class="admin-section-title">Espèces enregistrées</h2>
        <div id="admin-list"></div>
      </div>
    </main>
  </div>
  <script src="js/supabase.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
